[package]
name = "client"
version.workspace = true
edition.workspace = true

[features]
default = ["client"]
client = []


[dependencies]
image = { version = "0.24", default-features = false, features = ["png", "jpeg"] }
kira = "0.12.0"
anyhow = "1.0"
winit = { version = "0.30", features = ["android-native-activity"] }
env_logger = "0.10"
log = "0.4"
wgpu = "28.0"
pollster = "0.3"
bytemuck = { version = "1.24", features = ["derive"] }
cgmath = "0.18.0"
rayon = "1.11.0"
wgpu_text = "28.0"
noise = "0.9.0"
rand = "0.10.0"
num_cpus = "1.17.0"
quinn = "0.11"
tokio = { version = "1", features = ["rt", "net", "sync", "rt-multi-thread", "net", "macros", "io-util"] }
rustls = { workspace = true }
clap = { version = "4", features = ["derive"] }


shared = { path = "../shared" }
