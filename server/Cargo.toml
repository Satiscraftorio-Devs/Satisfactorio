[package]
name = "server"
version.workspace = true
edition.workspace = true


[[bin]]
name = "server"
path = "src/main.rs"


[features]
default = ["server"]
server = []

[dependencies]
noise = "0.9.0"
rayon = "1.11.0"
cgmath = "0.18.0"

shared = { path = "../shared" }
tokio = { workspace = true }
serde = { workspace = true }
bincode = { workspace = true }
clap = { version = "4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1.0.102"
rand = "0.10.1"
