
[workspace]
members = ["shared", "client", "server"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["StrachyDev", "Theora59-dev"]

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
bincode = "1.3"
rustls = { version = "0.23.37", default-features = false, features = ["ring"] }
tokio = { version = "1", features = ["rt-multi-thread", "net", "sync", "macros", "io-util"] }
quinn = "0.11"


[profile.release]
opt-level = 3
lto = true
